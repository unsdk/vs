name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Doc tests
        run: cargo test --doc --workspace

  build-artifacts:
    name: Build ${{ matrix.feature.label }} on ${{ matrix.platform.label }}
    needs: checks
    runs-on: ${{ matrix.platform.runner }}
    env:
      BUILD_PROFILE: min-size
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: linux
            runner: ubuntu-latest
            target: ""
            archive: tar.gz
            musl: false
          - label: macos
            runner: macos-latest
            target: ""
            archive: tar.gz
            musl: false
          - label: windows
            runner: windows-latest
            target: ""
            archive: zip
            musl: false
          - label: linux-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
        feature:
          - label: lua
            flags: lua
          - label: wasi
            flags: wasi
          - label: lua-wasi
            flags: lua,wasi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install musl toolchain
        if: ${{ matrix.platform.musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Configure musl linker
        if: ${{ matrix.platform.musl }}
        shell: bash
        run: |
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Add Rust target
        if: ${{ matrix.platform.target != '' }}
        run: rustup target add ${{ matrix.platform.target }}

      - name: Read workspace version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          cargo_toml = Path("Cargo.toml").read_text()
          match = re.search(r'\[workspace\.package\][\s\S]*?^version\s*=\s*"([^"]+)"', cargo_toml, re.MULTILINE)
          if not match:
              raise SystemExit("failed to read workspace version")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={match.group(1)}\n")
          PY

      - name: Build minimal binary
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          FEATURE_FLAGS: ${{ matrix.feature.flags }}
        run: |
          set -euxo pipefail
          if [ -n "$BUILD_TARGET" ]; then
            cargo build -p vs-cli --profile "$BUILD_PROFILE" --locked --no-default-features --features "$FEATURE_FLAGS" --target "$BUILD_TARGET"
          else
            cargo build -p vs-cli --profile "$BUILD_PROFILE" --locked --no-default-features --features "$FEATURE_FLAGS"
          fi

      - name: Package Unix artifact
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM_LABEL: ${{ matrix.platform.label }}
          ARTIFACT_VARIANT: ${{ matrix.feature.label }}
        run: |
          set -euxo pipefail
          if [ -n "$BUILD_TARGET" ]; then
            binary_path="target/$BUILD_TARGET/$BUILD_PROFILE/vs"
          else
            binary_path="target/$BUILD_PROFILE/vs"
          fi
          archive_name="vs-v${VERSION}-${PLATFORM_LABEL}-${ARTIFACT_VARIANT}.tar.gz"
          staging_dir="$(mktemp -d)"
          cp "$binary_path" "$staging_dir/vs"
          tar -C "$staging_dir" -czf "$archive_name" vs
          echo "ARCHIVE_PATH=$archive_name" >> "$GITHUB_ENV"

      - name: Package Windows artifact
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM_LABEL: ${{ matrix.platform.label }}
          ARTIFACT_VARIANT: ${{ matrix.feature.label }}
        run: |
          if ($env:BUILD_TARGET -ne "") {
            $binaryPath = "target\$env:BUILD_TARGET\$env:BUILD_PROFILE\vs.exe"
          } else {
            $binaryPath = "target\$env:BUILD_PROFILE\vs.exe"
          }
          $archiveName = "vs-v$env:VERSION-$env:PLATFORM_LABEL-$env:ARTIFACT_VARIANT.zip"
          $stagingDir = Join-Path $env:RUNNER_TEMP "vs-package-$env:PLATFORM_LABEL-$env:ARTIFACT_VARIANT"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item $binaryPath (Join-Path $stagingDir "vs.exe")
          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $archiveName -Force
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE_PATH=$archiveName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-v${{ steps.version.outputs.version }}-${{ matrix.platform.label }}-${{ matrix.feature.label }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 14
