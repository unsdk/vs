name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Doc tests
        run: cargo test --doc --workspace

  build-artifacts:
    name: Build ${{ matrix.feature.label }} on ${{ matrix.platform.label }}
    needs: checks
    runs-on: ${{ matrix.platform.runner }}
    env:
      BUILD_PROFILE: min-size
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: linux
            runner: ubuntu-latest
            target: ""
            archive: tar.gz
            musl: false
          - label: macos
            runner: macos-latest
            target: ""
            archive: tar.gz
            musl: false
          - label: windows
            runner: windows-latest
            target: ""
            archive: zip
            musl: false
          - label: linux-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
        feature:
          - label: lua
            flags: lua
          - label: wasi
            flags: wasi
          - label: lua-wasi
            flags: lua,wasi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install musl toolchain
        if: ${{ matrix.platform.musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Configure musl linker
        if: ${{ matrix.platform.musl }}
        shell: bash
        run: bash ./scripts/github-actions/configure_musl.sh

      - name: Add Rust target
        if: ${{ matrix.platform.target != '' }}
        run: rustup target add ${{ matrix.platform.target }}

      - name: Read workspace version
        id: version
        run: python3 ./scripts/github-actions/read_workspace_version.py

      - name: Build minimal binary
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          FEATURE_FLAGS: ${{ matrix.feature.flags }}
        run: bash ./scripts/github-actions/build_binary.sh

      - name: Package Unix artifact
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM_LABEL: ${{ matrix.platform.label }}
          ARTIFACT_VARIANT: ${{ matrix.feature.label }}
        run: bash ./scripts/github-actions/package_unix.sh

      - name: Package Windows artifact
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM_LABEL: ${{ matrix.platform.label }}
          ARTIFACT_VARIANT: ${{ matrix.feature.label }}
          STAGING_DIR_NAME: vs-package-${{ matrix.platform.label }}-${{ matrix.feature.label }}
        run: ./scripts/github-actions/package_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-v${{ steps.version.outputs.version }}-${{ matrix.platform.label }}-${{ matrix.feature.label }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 14
