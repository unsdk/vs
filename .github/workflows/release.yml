name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Normalize version
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update workspace version
        shell: bash
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          cargo_toml_path = Path("Cargo.toml")
          cargo_toml = cargo_toml_path.read_text(encoding="utf-8")
          pattern = r'(\[workspace\.package\][\s\S]*?^version\s*=\s*")([^"]+)(")'
          updated, replacements = re.subn(pattern, rf'\g<1>{version}\3', cargo_toml, count=1, flags=re.MULTILINE)
          if replacements != 1:
              raise SystemExit("failed to update workspace version")
          def update_internal_dep(match: re.Match[str]) -> str:
              line = match.group(0)
              if 'path = "crates/' not in line:
                  return line
              return re.sub(r'(version\s*=\s*")([^"]+)(")', rf'\g<1>{version}\3', line, count=1)
          updated = re.sub(r'^vs-[^=]+\s*=\s*\{[^}]*\}$', update_internal_dep, updated, flags=re.MULTILINE)
          cargo_toml_path.write_text(updated, encoding="utf-8")
          PY

      - name: Refresh lockfile
        run: cargo check -p vs-cli --all-features

      - name: Commit release version
        shell: bash
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "release: v$VERSION"
          fi

      - name: Push commit and tag
        shell: bash
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "$TAG"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true

  build-release-artifacts:
    name: Release ${{ matrix.feature.label }} on ${{ matrix.platform.label }}
    needs: prepare-release
    runs-on: ${{ matrix.platform.runner }}
    env:
      BUILD_PROFILE: min-size
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: linux
            runner: ubuntu-latest
            target: ""
            archive: tar.gz
            musl: false
          - label: macos
            runner: macos-latest
            target: ""
            archive: tar.gz
            musl: false
          - label: windows
            runner: windows-latest
            target: ""
            archive: zip
            musl: false
          - label: linux-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
        feature:
          - label: lua
            flags: lua
          - label: wasi
            flags: wasi
          - label: lua-wasi
            flags: lua,wasi

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        if: ${{ matrix.platform.musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Configure musl linker
        if: ${{ matrix.platform.musl }}
        shell: bash
        run: |
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Add Rust target
        if: ${{ matrix.platform.target != '' }}
        run: rustup target add ${{ matrix.platform.target }}

      - name: Build minimal binary
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          FEATURE_FLAGS: ${{ matrix.feature.flags }}
        run: |
          set -euxo pipefail
          if [ -n "$BUILD_TARGET" ]; then
            cargo build -p vs-cli --profile "$BUILD_PROFILE" --locked --no-default-features --features "$FEATURE_FLAGS" --target "$BUILD_TARGET"
          else
            cargo build -p vs-cli --profile "$BUILD_PROFILE" --locked --no-default-features --features "$FEATURE_FLAGS"
          fi

      - name: Package Unix release asset
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PLATFORM_LABEL: ${{ matrix.platform.label }}
          ARTIFACT_VARIANT: ${{ matrix.feature.label }}
        run: |
          set -euxo pipefail
          if [ -n "$BUILD_TARGET" ]; then
            binary_path="target/$BUILD_TARGET/$BUILD_PROFILE/vs"
          else
            binary_path="target/$BUILD_PROFILE/vs"
          fi
          archive_name="vs-v${VERSION}-${PLATFORM_LABEL}-${ARTIFACT_VARIANT}.tar.gz"
          staging_dir="$(mktemp -d)"
          cp "$binary_path" "$staging_dir/vs"
          tar -C "$staging_dir" -czf "$archive_name" vs
          echo "ARCHIVE_PATH=$archive_name" >> "$GITHUB_ENV"

      - name: Package Windows release asset
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          BUILD_TARGET: ${{ matrix.platform.target }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PLATFORM_LABEL: ${{ matrix.platform.label }}
          ARTIFACT_VARIANT: ${{ matrix.feature.label }}
        run: |
          if ($env:BUILD_TARGET -ne "") {
            $binaryPath = "target\$env:BUILD_TARGET\$env:BUILD_PROFILE\vs.exe"
          } else {
            $binaryPath = "target\$env:BUILD_PROFILE\vs.exe"
          }
          $archiveName = "vs-v$env:VERSION-$env:PLATFORM_LABEL-$env:ARTIFACT_VARIANT.zip"
          $stagingDir = Join-Path $env:RUNNER_TEMP "vs-release-$env:PLATFORM_LABEL-$env:ARTIFACT_VARIANT"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item $binaryPath (Join-Path $stagingDir "vs.exe")
          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $archiveName -Force
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE_PATH=$archiveName"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-v${{ needs.prepare-release.outputs.version }}-${{ matrix.platform.label }}-${{ matrix.feature.label }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: ${{ env.ARCHIVE_PATH }}

  publish-crates:
    name: Publish crates.io packages
    needs: [prepare-release, build-release-artifacts]
    if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' || vars.CARGO_REGISTRY_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' && secrets.CARGO_REGISTRY_TOKEN || vars.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish workspace crates
        shell: bash
        run: |
          set -euo pipefail

          publish_with_retry() {
            local crate="$1"
            local max_attempts=10
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Publishing $crate (attempt $attempt/$max_attempts)..."
              set +e
              output="$(cargo publish -p "$crate" --locked 2>&1)"
              status=$?
              set -e
              echo "$output"

              if [ "$status" -eq 0 ]; then
                return 0
              fi

              if grep -qiE "already uploaded|already exists|has already been uploaded" <<<"$output"; then
                echo "$crate is already published, skipping."
                return 0
              fi

              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Publishing $crate failed after $max_attempts attempts."
                return "$status"
              fi

              echo "Retrying $crate in 20 seconds..."
              sleep 20
              attempt=$((attempt + 1))
            done
          }

          crates=(
            vs-plugin-api
            vs-shell
            vs-config
            vs-plugin-sdk
            vs-registry
            vs-installer
            vs-plugin-lua
            vs-plugin-wasi
            vs-test-support
            vs-core
            vs-cli
          )

          for crate in "${crates[@]}"; do
            publish_with_retry "$crate"
          done
